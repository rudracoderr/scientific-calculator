<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic Calculator</title>
<link rel="stylesheet" href="math.css">
<link rel="icon" type="image/png" href="icons8-calculator-48.png">
</head>

<body>

<div id="calculator">

<!-- Display Screen -->
<input id="input" type="text" readonly placeholder="0">

<!-- Buttons -->
<div id="keys">

    <button onclick="clearall()" class="evaluate">AC</button>
    <button onclick="backspace()" class="evaluate">⌫</button>
    <button onclick="insert('(')">(</button>
    <button onclick="insert(')')">)</button>

    <button onclick="insert('sin(')" class="func">sin</button>
    <button onclick="insert('cos(')" class="func">cos</button>
    <button onclick="insert('tan(')" class="func">tan</button>
    <button onclick="insert('/')" class="op">÷</button>

    <button onclick="insert('log(')" class="func">log</button>
    <button onclick="insert('ln(')" class="func">ln</button>
    <button onclick="insert('sqrt(')" class="func">√</button>
    <button onclick="insert('*')" class="op">×</button>

    <button onclick="insert('7')">7</button>
    <button onclick="insert('8')">8</button>
    <button onclick="insert('9')">9</button>
    <button onclick="insert('-')" class="op">-</button>

    <button onclick="insert('4')">4</button>
    <button onclick="insert('5')">5</button>
    <button onclick="insert('6')">6</button>
    <button onclick="insert('+')" class="op">+</button>

    <button onclick="insert('1')">1</button>
    <button onclick="insert('2')">2</button>
    <button onclick="insert('3')">3</button>
    <button onclick="calculate()" class="evaluate">=</button>

    <button onclick="insert('pi')" class="func">π</button>
    <button onclick="insert('0')">0</button>
    <button onclick="insert('.')">.</button>
    <button onclick="insert('^2')" class="func">x²</button>

</div>

</div>

<script src="math.js"></script>

</body>
</html>
